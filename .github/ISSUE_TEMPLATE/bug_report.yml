name: Bug report
description: Something is broken or not working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: dropdown
    id: component
    attributes:
      label: Which part of the setup is affected?
      options:
        - Terraform / VM provisioning
        - cloud-init bootstrap
        - Ansible hardening role
        - Ansible tailscale role
        - Ansible openclaw role
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `terraform apply`
        2. ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Proxmox version, Terraform version, Ansible version, OS
      placeholder: |
        Proxmox: 8.x
        Terraform: 1.x
        Ansible: 2.x
        Host OS: macOS / Linux
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
